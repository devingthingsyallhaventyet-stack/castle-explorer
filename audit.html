<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CastleCore Audit Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--gold:#c9a44a;--green:#238636;--red:#da3633;--blue:#58a6ff;--text:#e6edf3;--muted:#8b949e;--card-hover:#1c2129}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;overflow-x:hidden}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}

/* Top Bar */
.topbar{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar input[type=text]{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:14px;width:200px}
.topbar select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-size:13px}
.topbar .spacer{flex:1}
.view-toggle{display:flex;gap:4px}
.view-toggle button{background:var(--bg);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}
.view-toggle button.active{color:var(--gold);border-color:var(--gold)}

/* Main Tabs */
.main-tabs{display:flex;gap:0;margin-right:12px}
.main-tab{padding:6px 18px;background:var(--bg);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:14px;font-weight:600;transition:.15s}
.main-tab:first-child{border-radius:6px 0 0 6px}
.main-tab:last-child{border-radius:0 6px 6px 0}
.main-tab.active{background:var(--gold);color:#0d1117;border-color:var(--gold)}
.main-tab .tab-badge{font-size:11px;background:rgba(0,0,0,.2);padding:1px 6px;border-radius:8px;margin-left:4px}
.main-tab.active .tab-badge{background:rgba(0,0,0,.3)}

/* Progress */
.progress-bar{height:4px;display:flex;width:100%}
.progress-bar .seg-approved{background:var(--green)}
.progress-bar .seg-flagged{background:var(--red)}
.progress-bar .seg-unreviewed{background:var(--border)}

/* Jump */
.jump-bar{background:var(--card);border-bottom:1px solid var(--border);padding:4px 16px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.jump-bar input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;width:80px;font-size:13px}
.jump-bar .stats span{margin-right:12px}
.jump-bar .stats .st-approved{color:var(--green)}
.jump-bar .stats .st-flagged{color:var(--red)}

/* Card View */
.card-container{max-width:1400px;margin:0 auto;padding:16px}
.card-header{margin-bottom:12px}
.card-header h1{font-size:28px;color:var(--gold);margin-bottom:4px;display:flex;align-items:baseline;gap:12px}
.card-header h1 .counter{font-size:16px;color:var(--muted);font-weight:400}
.card-header .meta{display:flex;gap:12px;flex-wrap:wrap;font-size:13px;color:var(--muted)}
.card-header .meta span{background:var(--bg);padding:2px 8px;border-radius:4px;border:1px solid var(--border)}
.card-header .status-badge{padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600;text-transform:uppercase}
.badge-approved{background:var(--green);color:#fff}
.badge-flagged{background:var(--red);color:#fff}

.card-body{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.card-body{grid-template-columns:1fr}}

.col-left .main-image{width:100%;max-height:450px;object-fit:contain;border-radius:8px;background:var(--bg);border:1px solid var(--border);cursor:pointer}
.gallery{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.gallery-item{position:relative;display:inline-block}
.gallery img{width:70px;height:50px;object-fit:cover;border-radius:4px;border:3px solid transparent;cursor:pointer;opacity:.6;transition:.15s}
.gallery img:hover{opacity:.9}
.gallery img.img-selected{opacity:1;border-color:var(--blue);box-shadow:0 0 8px rgba(88,166,255,.5)}
.gallery img.img-main{border-color:var(--gold);opacity:1;box-shadow:0 0 8px rgba(201,164,74,.5)}
.gallery img.img-deleted{border-color:var(--red);opacity:.4;box-shadow:0 0 8px rgba(218,54,51,.4)}
.gallery img.img-deleted::after{content:'✕';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--red);font-size:24px;font-weight:bold}
.gallery img.img-flagged{border-color:var(--red);opacity:1}
.img-flag-btn{position:absolute;top:-4px;right:-4px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:10px;display:none;align-items:center;justify-content:center;z-index:5;line-height:1}
.gallery-item:hover .img-flag-btn,.img-flag-btn.flagged{display:flex}
.img-flag-btn.flagged{background:var(--red);opacity:1}
.img-flag-btn:not(.flagged){background:var(--border)}
.main-image-wrap{position:relative}
.main-image-wrap .img-flag-btn{display:none;top:8px;right:8px;width:28px;height:28px;font-size:14px}
.main-image-wrap:hover .img-flag-btn,.main-image-wrap .img-flag-btn.flagged{display:flex}
.inline-flag-btn{background:var(--bg);border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:.15s}
.inline-flag-btn:hover{border-color:var(--red);color:var(--red)}
.inline-flag-btn.flagged{background:#1a0a0a;border-color:var(--red);color:var(--red)}

.col-right iframe{width:100%;height:350px;border:1px solid var(--border);border-radius:8px}

.blurb-section,.wiki-section{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.blurb-section h3,.wiki-section h3{color:var(--gold);font-size:15px;margin-bottom:8px}
.wiki-section .wiki-content{display:flex;gap:16px}
.wiki-section .wiki-thumb{width:120px;min-width:120px;border-radius:6px}
.wiki-section .wiki-text{flex:1;font-size:14px;line-height:1.6;color:var(--muted)}
.wiki-section .wiki-coords{font-size:12px;color:var(--muted);margin-top:6px}
.wiki-section .wiki-link{margin-top:8px;display:inline-block}
.wiki-loading{color:var(--muted);font-style:italic}

/* Action Bar */
.action-bar{position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:center;gap:12px;z-index:100}
.action-bar button{padding:10px 28px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
.btn-approve{background:var(--green);color:#fff}.btn-approve:hover{filter:brightness(1.2)}
.btn-flag{background:var(--red);color:#fff}.btn-flag:hover{filter:brightness(1.2)}
.btn-skip{background:var(--border);color:var(--text)}.btn-skip:hover{background:#444}
.btn-prev{background:var(--bg);color:var(--muted);border:1px solid var(--border)!important}.btn-prev:hover{color:var(--text)}
.action-bar .kbd{font-size:11px;color:var(--muted);margin-left:4px;background:var(--bg);padding:1px 5px;border-radius:3px;border:1px solid var(--border)}

/* Flag Panel */
.flag-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center}
.flag-overlay.open{display:flex}
.flag-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;width:460px;max-width:95vw}
.flag-panel h3{color:var(--gold);margin-bottom:16px}
.flag-reasons{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.flag-reasons label{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:14px;transition:.15s}
.flag-reasons label:hover{border-color:var(--muted)}
.flag-reasons label.selected{border-color:var(--red);background:#1a0a0a}
.flag-reasons label .num{color:var(--muted);font-size:12px;min-width:18px}
.flag-reasons input[type=checkbox]{accent-color:var(--red)}
.flag-note{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-size:14px;resize:vertical;min-height:60px;margin-bottom:12px}
.flag-actions{display:flex;gap:8px;justify-content:flex-end}
.flag-actions button{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-weight:600}

/* Table View */
.table-container{display:none;padding:16px;overflow-x:auto}
.table-container table{width:100%;border-collapse:collapse;font-size:13px}
.table-container th{background:var(--card);color:var(--gold);padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);position:sticky;top:40px;z-index:10}
.table-container td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.table-container tr:hover td{background:var(--card-hover)}
.table-container .tbl-img{width:60px;height:40px;object-fit:cover;border-radius:4px}
.table-container .tbl-status{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}

/* Shortcuts help */
.export-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;z-index:100;font-size:13px;color:var(--muted)}
.export-bar button{background:var(--gold);color:#000;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px;margin-left:6px}
.export-bar button:hover{filter:brightness(1.1)}
body{padding-bottom:50px}
.shortcuts-help{position:fixed;bottom:50px;right:16px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;color:var(--muted);z-index:50;line-height:1.8}
.shortcuts-help kbd{background:var(--bg);padding:1px 5px;border-radius:3px;border:1px solid var(--border);color:var(--text);font-family:monospace}
.img-state-bar{display:flex;gap:8px;margin-top:8px;font-size:12px;align-items:center;color:var(--muted)}
.img-state-bar .state-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.main-image-state{position:absolute;top:8px;left:8px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;z-index:5;pointer-events:none}
.main-image-state.is-main{background:var(--gold);color:#000}
.main-image-state.is-deleted{background:var(--red);color:#fff}
.main-image.img-border-main{border:3px solid var(--gold);box-shadow:0 0 12px rgba(201,164,74,.4)}
.main-image.img-border-deleted{border:3px solid var(--red);opacity:.5;box-shadow:0 0 12px rgba(218,54,51,.4)}
.main-image.img-border-selected{border:3px solid var(--blue);box-shadow:0 0 12px rgba(88,166,255,.4)}
.gallery-item{position:relative;display:inline-block}
.gallery-item .del-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--red);font-size:20px;font-weight:bold;pointer-events:none;background:rgba(0,0,0,.4);border-radius:4px}
</style>
</head>
<body>

<div class="topbar">
  <strong style="color:var(--gold);font-size:16px">🏰 CastleCore Audit</strong>
  <div class="main-tabs">
    <div class="main-tab active" id="tabReview" onclick="switchMainTab('review')">📋 Review <span class="tab-badge" id="tabReviewCount">0</span></div>
    <div class="main-tab" id="tabFlagged" onclick="switchMainTab('flagged')">⚠️ Flagged <span class="tab-badge" id="tabFlaggedCount">0</span></div>
    <div class="main-tab" id="tabApproved" onclick="switchMainTab('approved')">✅ Approved <span class="tab-badge" id="tabApprovedCount">0</span></div>
  </div>
  <input type="text" id="searchBox" placeholder="Search castles...">
  <select id="countryFilter"><option value="">All Countries</option></select>
  <select id="imgSourceFilter"><option value="">All Sources</option></select>
  <select id="statusFilter" style="display:none">
    <option value="">All</option>
    <option value="unreviewed" selected>Unreviewed</option>
    <option value="approved">Approved</option>
    <option value="flagged">Flagged</option>
  </select>
  <div class="spacer"></div>
  <div class="view-toggle">
    <button id="btnCardView" class="active" onclick="setView('card')">Card</button>
    <button id="btnTableView" onclick="setView('table')">Table</button>
  </div>
</div>

<div class="progress-bar">
  <div class="seg-approved" id="progApproved"></div>
  <div class="seg-flagged" id="progFlagged"></div>
  <div class="seg-unreviewed" id="progUnreviewed"></div>
</div>

<div class="jump-bar">
  <span>Go to #</span>
  <input type="number" id="jumpInput" min="1" placeholder="#">
  <button onclick="jumpTo()" style="background:var(--gold);color:#000;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px">Jump</button>
  <div class="spacer" style="flex:1"></div>
  <div class="stats" id="statsBar"></div>
</div>

<div class="card-container" id="cardView"></div>

<div class="table-container" id="tableView"></div>

<div class="action-bar" id="actionBar">
  <button class="btn-prev" onclick="selectedImgIdx=0;goPrev()">← Prev <span class="kbd">P</span></button>
  <button style="background:var(--blue);color:#fff;padding:10px 16px;border:none;border-radius:8px;font-size:14px;cursor:pointer" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'ArrowLeft'}))">◄ Img <span class="kbd">←</span></button>
  <button style="background:var(--blue);color:#fff;padding:10px 16px;border:none;border-radius:8px;font-size:14px;cursor:pointer" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'ArrowRight'}))">Img ► <span class="kbd">→</span></button>
  <button class="btn-approve" onclick="setMainImage()">⭐ Main <span class="kbd">A</span></button>
  <button class="btn-flag" onclick="toggleDeleteImage()">🗑 Delete <span class="kbd">F</span></button>
  <button style="background:var(--green);color:#fff;padding:10px 28px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer" onclick="submitAndNext()">✓ Submit <span class="kbd">Enter</span></button>
  <button class="btn-skip" onclick="selectedImgIdx=0;goNext()">Skip <span class="kbd">S</span></button>
</div>

<div class="flag-overlay" id="flagOverlay">
  <div class="flag-panel">
    <h3>⚑ Flag this listing</h3>
    <div class="flag-reasons" id="flagReasons"></div>
    <textarea class="flag-note" id="flagNote" placeholder="Optional note..."></textarea>
    <div class="flag-actions">
      <button style="background:var(--border);color:var(--text)" onclick="closeFlagPanel()">Cancel <span class="kbd">Esc</span></button>
      <button style="background:var(--red);color:#fff" onclick="confirmFlag()">Confirm Flag <span class="kbd">Enter</span></button>
    </div>
  </div>
</div>

<div class="export-bar">
  <span id="exportCount"></span>
  <div>
    <button onclick="exportCSV('all')">📥 Export All</button>
    <button onclick="exportCSV('flagged')" style="background:var(--red);color:#fff">⚠️ Export Flagged</button>
    <button onclick="copyForClawz()">🦞 Copy Flagged for Clawz</button>
    <button onclick="saveProgressToFile()" style="background:var(--green);color:#fff">💾 Save Progress</button>
  </div>
</div>

<div class="shortcuts-help">
  <kbd>←</kbd><kbd>→</kbd> Scroll images &nbsp; <kbd>A</kbd> Set main ⭐ &nbsp; <kbd>F</kbd> Toggle delete 🗑<br>
  <kbd>Enter</kbd> Submit &amp; next &nbsp; <kbd>S</kbd> Skip &nbsp; <kbd>P</kbd> Prev listing
</div>

<script>
let flaggedImages = {};
try { const fi = JSON.parse(localStorage.getItem('castle-flagged-images') || '{}'); Object.keys(fi).forEach(k => flaggedImages[k] = new Set(fi[k])); } catch(e) {}
function saveFlaggedImages() { const obj = {}; Object.keys(flaggedImages).forEach(k => obj[k] = [...flaggedImages[k]]); localStorage.setItem('castle-flagged-images', JSON.stringify(obj)); }
function toggleImageFlag(castleKey, url, btn) { if (!flaggedImages[castleKey]) flaggedImages[castleKey] = new Set(); if (flaggedImages[castleKey].has(url)) { flaggedImages[castleKey].delete(url); } else { flaggedImages[castleKey].add(url); } saveFlaggedImages(); renderCard(); }

// Image review state: { castleKey: { main: imgIdx, deleted: Set<imgIdx> } }
let imageDecisions = {};
try { const id = JSON.parse(localStorage.getItem('castle-image-decisions') || '{}'); Object.keys(id).forEach(k => { imageDecisions[k] = { main: id[k].main, deleted: new Set(id[k].deleted||[]) }; }); } catch(e) {}
function saveImageDecisions() { const obj = {}; Object.keys(imageDecisions).forEach(k => { obj[k] = { main: imageDecisions[k].main, deleted: [...imageDecisions[k].deleted] }; }); localStorage.setItem('castle-image-decisions', JSON.stringify(obj)); }
let selectedImgIdx = 0;

let fieldFlags = {};
try { fieldFlags = JSON.parse(localStorage.getItem('castle-field-flags') || '{}'); } catch(e) {}
function saveFieldFlags() { localStorage.setItem('castle-field-flags', JSON.stringify(fieldFlags)); }
function toggleFieldFlag(castleKey, field) { if (!fieldFlags[castleKey]) fieldFlags[castleKey] = {}; fieldFlags[castleKey][field] = !fieldFlags[castleKey][field]; if (!fieldFlags[castleKey][field]) delete fieldFlags[castleKey][field]; if (!Object.keys(fieldFlags[castleKey]).length) delete fieldFlags[castleKey]; saveFieldFlags(); renderCard(); }
const FLAG_REASONS = [
  { id: 'wrong-image', label: 'Wrong image — doesn\'t match castle' },
  { id: 'wrong-name', label: 'Wrong name — incorrect/misspelled' },
  { id: 'wrong-location', label: 'Wrong location — coordinates wrong' },
  { id: 'wrong-blurb', label: 'Wrong blurb — description mismatch' },
  { id: 'no-image', label: 'No image — missing entirely' },
  { id: 'duplicate', label: 'Duplicate listing' },
  { id: 'not-heritage', label: 'Not heritage — commercial property' },
  { id: 'other', label: 'Other (see note)' }
];

let allData = [];
let filtered = [];
let currentIdx = 0;
let reviewState = {};
let currentView = 'card';
let currentMainTab = 'review';
let flagPanelOpen = false;
const wikiCache = new Map();

function switchMainTab(tab) {
  currentMainTab = tab;
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab === 'review' ? 'tabReview' : tab === 'flagged' ? 'tabFlagged' : 'tabApproved').classList.add('active');
  // Set view mode (but don't render yet — applyFilters will handle it)
  const wantView = (tab === 'flagged' || tab === 'approved') ? 'table' : 'card';
  currentView = wantView;
  document.getElementById('cardView').style.display = wantView === 'card' ? 'block' : 'none';
  document.getElementById('tableView').style.display = wantView === 'table' ? 'block' : 'none';
  document.getElementById('actionBar').style.display = wantView === 'card' ? 'flex' : 'none';
  document.getElementById('btnCardView').classList.toggle('active', wantView === 'card');
  document.getElementById('btnTableView').classList.toggle('active', wantView === 'table');
  applyFilters();
}

function updateTabCounts() {
  let ap = 0, fl = 0, un = 0;
  allData.forEach(d => { const s = getStatus(d); if (s === 'approved') ap++; else if (s === 'flagged') fl++; else un++; });
  document.getElementById('tabReviewCount').textContent = un;
  document.getElementById('tabFlaggedCount').textContent = fl;
  document.getElementById('tabApprovedCount').textContent = ap;
}

// Review state: loaded from data file, localStorage used as write-ahead cache
try { reviewState = JSON.parse(localStorage.getItem('castle-review-state') || '{}'); } catch(e) { reviewState = {}; }
function saveState() { 
  localStorage.setItem('castle-review-state', JSON.stringify(reviewState));
  // Also update the in-memory data so exports are current
  const d = filtered[currentIdx];
  if (d) {
    const st = reviewState[getKey(d)];
    if (st) { d.reviewStatus = st.status; d.reviewReasons = st.reasons; d.reviewNote = st.note; }
  }
}
function getKey(d) { return d.name + '|' + d.country; }
function getStatus(d) { 
  // localStorage overrides take priority, then fall back to data file
  const ls = reviewState[getKey(d)]; 
  if (ls) return ls.status;
  return d.reviewStatus || 'unreviewed'; 
}

// Load data
fetch('audit-data.json').then(r => r.json()).then(data => {
  allData = data;
  // Seed reviewState from data file (don't overwrite localStorage changes)
  data.forEach(d => {
    const key = getKey(d);
    if (!reviewState[key] && d.reviewStatus) {
      reviewState[key] = { status: d.reviewStatus, reasons: d.reviewReasons, note: d.reviewNote, ts: 0 };
    }
  });
  populateFilters();
  applyFilters();
  updateProgress();
});

function populateFilters() {
  const countries = [...new Set(allData.map(d => d.country))].sort();
  const sources = [...new Set(allData.map(d => d.imgSource).filter(Boolean))].sort();
  const cf = document.getElementById('countryFilter');
  countries.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c.charAt(0).toUpperCase() + c.slice(1).replace(/-/g,' '); cf.appendChild(o); });
  const sf = document.getElementById('imgSourceFilter');
  sources.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sf.appendChild(o); });
}

function applyFilters() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const country = document.getElementById('countryFilter').value;
  const imgSrc = document.getElementById('imgSourceFilter').value;
  // Use main tab for status filtering
  const statusMap = { review: 'unreviewed', flagged: 'flagged', approved: 'approved' };
  const status = statusMap[currentMainTab] || '';
  filtered = allData.filter(d => {
    if (q && !d.name.toLowerCase().includes(q) && !(d.county||'').toLowerCase().includes(q)) return false;
    if (country && d.country !== country) return false;
    if (imgSrc && d.imgSource !== imgSrc) return false;
    if (status) { const s = getStatus(d); if (status !== s) return false; }
    return true;
  });
  currentIdx = 0;
  if (currentView === 'card') renderCard();
  else renderTable();
  updateProgress();
}

document.getElementById('searchBox').addEventListener('input', debounce(applyFilters, 300));
document.getElementById('countryFilter').addEventListener('change', applyFilters);
document.getElementById('imgSourceFilter').addEventListener('change', applyFilters);
document.getElementById('statusFilter').addEventListener('change', applyFilters);

function debounce(fn, ms) { let t; return function(...a) { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

function updateProgress() {
  let ap = 0, fl = 0, un = 0;
  allData.forEach(d => { const s = getStatus(d); if (s === 'approved') ap++; else if (s === 'flagged') fl++; else un++; });
  const total = allData.length || 1;
  document.getElementById('progApproved').style.width = (ap/total*100)+'%';
  document.getElementById('progFlagged').style.width = (fl/total*100)+'%';
  document.getElementById('progUnreviewed').style.width = (un/total*100)+'%';
  document.getElementById('statsBar').innerHTML =
    `<span class="st-approved">✓ ${ap} approved</span>` +
    `<span class="st-flagged">⚑ ${fl} flagged</span>` +
    `<span>${un} unreviewed</span>` +
    `<span style="color:var(--muted)">${total} total</span>` +
    `<span style="color:var(--gold);font-weight:600">${((ap+fl)/total*100).toFixed(1)}% done</span>`;
  updateTabCounts();
}

// Card rendering
function renderCard() {
  const el = document.getElementById('cardView');
  if (!filtered.length) { el.innerHTML = '<p style="padding:40px;text-align:center;color:var(--muted)">No listings match your filters.</p>'; return; }
  const d = filtered[currentIdx];
  const key = getKey(d);
  const st = reviewState[key];
  const statusBadge = st ? `<span class="status-badge ${st.status==='approved'?'badge-approved':'badge-flagged'}">${st.status}${st.reasons?' — '+st.reasons.join(', '):''}</span>` : '';

  const hasCoords = d.lat && d.lng;
  const mapUrl = hasCoords
    ? `https://www.openstreetmap.org/export/embed.html?bbox=${d.lng-0.02},${d.lat-0.015},${Number(d.lng)+0.02},${Number(d.lat)+0.015}&layer=mapnik&marker=${d.lat},${d.lng}`
    : null;
  const mapsSearchUrl = d.mapsLink || `https://www.google.com/maps/search/${encodeURIComponent(d.name+' '+(d.county||'')+' castle')}`;

  // Build gallery: main image first, then gallery images
  const allImages = [];
  if (d.image) allImages.push(d.image);
  (d.gallery||[]).forEach(url => { if (url !== d.image) allImages.push(url); });
  // Clamp selectedImgIdx
  if (selectedImgIdx >= allImages.length) selectedImgIdx = Math.max(0, allImages.length - 1);
  const fi = flaggedImages[key] || new Set();
  const dec = imageDecisions[key] || { main: 0, deleted: new Set() };
  const galleryHtml = allImages.map((url,i) => {
    const isSelected = i === selectedImgIdx;
    const isMain = dec.main === i;
    const isDeleted = dec.deleted.has(i);
    let cls = 'gallery-thumb';
    if (isDeleted) cls += ' img-deleted';
    else if (isMain) cls += ' img-main';
    if (isSelected) cls += ' img-selected';
    return `<div class="gallery-item">
      <img src="${url}" class="${cls}" onclick="selectedImgIdx=${i};renderCard()" loading="lazy" alt="image ${i+1}">
      ${isDeleted ? '<div class="del-overlay">✕</div>' : ''}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="card-header">
      <h1>${esc(d.name)} <span class="counter">${currentIdx+1} / ${filtered.length}</span> ${statusBadge}</h1>
      <div class="meta">
        <span>🌍 ${esc(d.country)}</span>
        ${d.region ? `<span>📍 ${esc(d.region.replace(/-/g,' '))}</span>` : ''}
        ${d.county ? `<span>🏛 ${esc(d.county)}</span>` : ''}
        ${d.type ? `<span>${esc(d.type)}</span>` : ''}
        ${d.period ? `<span>🕐 ${esc(d.period)}</span>` : ''}
        ${d.rating ? `<span>⭐ ${d.rating}</span>` : ''}
        ${d.imgSource ? `<span>📷 ${esc(d.imgSource)}</span>` : ''}
        ${d.tags && d.tags.length ? `<span>🏷 ${d.tags.join(', ')}</span>` : ''}
        <span><a href="${mapsSearchUrl}" target="_blank" style="color:var(--blue);font-size:12px">📍 Google Maps ↗</a></span>
        ${d.wiki ? `<span><a href="${esc(d.wiki)}" target="_blank" style="color:var(--blue);font-size:12px">📖 Wikipedia ↗</a></span>` : ''}
      </div>
    </div>
    <div class="card-body">
      <div class="col-left">
        <div class="main-image-wrap">
          ${allImages.length ? (() => {
            const imgUrl = allImages[selectedImgIdx] || allImages[0];
            const isMain = dec.main === selectedImgIdx;
            const isDeleted = dec.deleted.has(selectedImgIdx);
            let borderCls = isDeleted ? 'img-border-deleted' : isMain ? 'img-border-main' : 'img-border-selected';
            let stateLabel = isDeleted ? '<div class="main-image-state is-deleted">🗑 DELETE</div>' : isMain ? '<div class="main-image-state is-main">⭐ MAIN</div>' : '';
            return `${stateLabel}<img class="main-image ${borderCls}" id="mainImg" src="${esc(imgUrl)}" alt="${esc(d.name)}" onerror="this.src='';this.alt='Image failed to load'">`;
          })() : '<div style="height:300px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:8px;border:1px solid var(--border);color:var(--muted)">No image</div>'}
        </div>
        <div class="gallery">${galleryHtml}</div>
        <div class="img-state-bar">
          <span><span class="state-dot" style="background:var(--blue)"></span> Selected</span>
          <span><span class="state-dot" style="background:var(--gold)"></span> Main (A)</span>
          <span><span class="state-dot" style="background:var(--red)"></span> Delete (F)</span>
          <span style="margin-left:auto">${selectedImgIdx+1} / ${allImages.length} images</span>
        </div>
      </div>
      <div class="col-right">
        ${mapUrl ? `<iframe src="${mapUrl}" allowfullscreen loading="lazy" style="width:100%;height:350px;border:1px solid var(--border);border-radius:8px"></iframe>` : `<div style="height:350px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:8px;border:1px solid var(--border);color:var(--muted);flex-direction:column;gap:8px"><span>No coordinates</span><a href="${mapsSearchUrl}" target="_blank">Search Google Maps →</a></div>`}
        ${hasCoords ? `<div style="font-size:12px;color:var(--muted);margin-top:4px">📍 ${d.lat}, ${d.lng} · <a href="${mapsSearchUrl}" target="_blank">Open in Google Maps</a></div>` : ''}
        <button class="inline-flag-btn${(fieldFlags[key]||{}).location?' flagged':''}" onclick="toggleFieldFlag('${key.replace(/'/g,"\\'")}','location')" style="margin-top:8px">⚑ ${(fieldFlags[key]||{}).location?'Location flagged — click to unflag':'Flag location'}</button>
      </div>
    </div>
    <div class="blurb-section" style="position:relative">
      <h3>Our Description <button class="inline-flag-btn${(fieldFlags[key]||{}).description?' flagged':''}" onclick="toggleFieldFlag('${key.replace(/'/g,"\\'")}','description')" style="margin-left:12px">⚑ ${(fieldFlags[key]||{}).description?'Description flagged':'Flag description'}</button></h3>
      <p style="font-size:14px;line-height:1.6;color:var(--muted)">${d.desc ? esc(d.desc) : '<em>No description</em>'}</p>
      ${d.source ? `<div style="margin-top:6px;font-size:12px"><a href="${esc(d.source)}" target="_blank">Source</a></div>` : ''}
      ${d.wiki ? `<div style="font-size:12px"><a href="${esc(d.wiki)}" target="_blank">Wiki link in data</a></div>` : ''}
    </div>
    <div class="wiki-section" id="wikiSection">
      <h3>Wikipedia Comparison</h3>
      <div class="wiki-loading">Loading Wikipedia data...</div>
    </div>
  `;
  fetchWiki(d);
}

// swapMainImage replaced by selectedImgIdx + renderCard()

async function fetchWiki(d) {
  const el = document.getElementById('wikiSection');
  const wikiName = d.wiki ? d.wiki.split('/wiki/').pop() : encodeURIComponent(d.name.replace(/ /g,'_'));
  
  if (wikiCache.has(wikiName)) { renderWiki(el, d, wikiCache.get(wikiName)); return; }
  
  try {
    const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${wikiName}`);
    if (!r.ok) throw new Error('not found');
    const data = await r.json();
    wikiCache.set(wikiName, data);
    renderWiki(el, d, data);
  } catch(e) {
    el.innerHTML = `<h3>Wikipedia Comparison</h3>
      <p style="color:var(--muted)">No Wikipedia article found for "${esc(d.name)}"</p>
      <a href="https://www.google.com/search?q=${encodeURIComponent(d.name+' castle wikipedia')}" target="_blank">Search Google →</a>`;
  }
}

function renderWiki(el, d, w) {
  const thumb = w.thumbnail ? `<img class="wiki-thumb" src="${w.thumbnail.source}" alt="Wikipedia image">` : '';
  const coords = w.coordinates ? `<div class="wiki-coords">Wiki coords: ${w.coordinates.lat}, ${w.coordinates.lon}</div>` : '';
  el.innerHTML = `<h3>Wikipedia Comparison</h3>
    <div class="wiki-content">
      ${thumb}
      <div class="wiki-text">
        <strong>${esc(w.title||'')}</strong>
        <p style="margin-top:6px">${esc(w.extract||'')}</p>
        ${coords}
        <a class="wiki-link" href="${w.content_urls?.desktop?.page||'#'}" target="_blank">Read full article →</a>
      </div>
    </div>`;
}

// Navigation
function goNext() {
  if (currentIdx < filtered.length - 1) { currentIdx++; renderCard(); }
}
function goPrev() {
  if (currentIdx > 0) { currentIdx--; renderCard(); }
}
function advanceToNextUnreviewed() {
  for (let i = currentIdx + 1; i < filtered.length; i++) {
    if (getStatus(filtered[i]) === 'unreviewed') { currentIdx = i; renderCard(); return; }
  }
  // wrap
  for (let i = 0; i < currentIdx; i++) {
    if (getStatus(filtered[i]) === 'unreviewed') { currentIdx = i; renderCard(); return; }
  }
  goNext();
}
function jumpTo() {
  const v = parseInt(document.getElementById('jumpInput').value);
  if (v >= 1 && v <= filtered.length) { currentIdx = v - 1; renderCard(); }
}

// Actions
function doApprove() {
  if (!filtered.length) return;
  const d = filtered[currentIdx];
  reviewState[getKey(d)] = { status: 'approved', ts: Date.now() };
  saveState(); updateProgress(); advanceToNextUnreviewed();
}

function quickFlag() {
  if (!filtered.length) return;
  const d = filtered[currentIdx];
  const key = getKey(d);
  reviewState[key] = { status: 'flagged', reasons: ['needs-review'], ts: Date.now() };
  saveState(); updateProgress(); advanceToNextUnreviewed();
}

function openFlagPanel() {
  flagPanelOpen = true;
  const el = document.getElementById('flagReasons');
  el.innerHTML = FLAG_REASONS.map((r,i) =>
    `<label id="fr-${i}" onclick="toggleFlagReason(${i})"><span class="num">${i+1}</span><input type="checkbox" data-reason="${r.id}"> ${r.label}</label>`
  ).join('');
  document.getElementById('flagNote').value = '';
  document.getElementById('flagOverlay').classList.add('open');
}
function closeFlagPanel() {
  flagPanelOpen = false;
  document.getElementById('flagOverlay').classList.remove('open');
}
function toggleFlagReason(i) {
  const label = document.getElementById('fr-'+i);
  const cb = label.querySelector('input');
  cb.checked = !cb.checked;
  label.classList.toggle('selected', cb.checked);
}
function confirmFlag() {
  if (!filtered.length) return;
  const reasons = [...document.querySelectorAll('#flagReasons input:checked')].map(c => c.dataset.reason);
  if (!reasons.length) return;
  const d = filtered[currentIdx];
  const note = document.getElementById('flagNote').value.trim();
  reviewState[getKey(d)] = { status: 'flagged', reasons, note: note || undefined, ts: Date.now() };
  saveState(); closeFlagPanel(); updateProgress(); advanceToNextUnreviewed();
}

// Image decision helpers
function toggleDeleteImage() {
  if (!filtered.length) return;
  const d = filtered[currentIdx];
  const key = getKey(d);
  const allImages = []; if (d.image) allImages.push(d.image); (d.gallery||[]).forEach(u => { if (u !== d.image) allImages.push(u); });
  if (!allImages.length) return;
  if (!imageDecisions[key]) imageDecisions[key] = { main: 0, deleted: new Set() };
  const dec = imageDecisions[key];
  if (dec.deleted.has(selectedImgIdx)) dec.deleted.delete(selectedImgIdx);
  else { dec.deleted.add(selectedImgIdx); if (dec.main === selectedImgIdx) dec.main = -1; }
  saveImageDecisions(); renderCard();
}

function setMainImage() {
  if (!filtered.length) return;
  const d = filtered[currentIdx];
  const key = getKey(d);
  const allImages = []; if (d.image) allImages.push(d.image); (d.gallery||[]).forEach(u => { if (u !== d.image) allImages.push(u); });
  if (!allImages.length) return;
  if (!imageDecisions[key]) imageDecisions[key] = { main: 0, deleted: new Set() };
  const dec = imageDecisions[key];
  dec.deleted.delete(selectedImgIdx); // undelete if was deleted
  dec.main = selectedImgIdx;
  saveImageDecisions(); renderCard();
}

function submitAndNext() {
  if (!filtered.length) return;
  // Mark this listing's image review as submitted
  const d = filtered[currentIdx];
  const key = getKey(d);
  if (!imageDecisions[key]) imageDecisions[key] = { main: 0, deleted: new Set() };
  imageDecisions[key].submitted = true;
  saveImageDecisions();
  // Advance
  selectedImgIdx = 0;
  if (currentIdx < filtered.length - 1) { currentIdx++; renderCard(); }
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (flagPanelOpen) {
    if (e.key === 'Escape') { closeFlagPanel(); e.preventDefault(); }
    else if (e.key === 'Enter') { confirmFlag(); e.preventDefault(); }
    else if (e.key >= '1' && e.key <= '8') { toggleFlagReason(parseInt(e.key)-1); e.preventDefault(); }
    return;
  }
  if (currentView === 'card') {
    // Image navigation: left/right scroll through images
    if (e.key === 'ArrowLeft') {
      if (selectedImgIdx > 0) { selectedImgIdx--; renderCard(); }
      e.preventDefault(); return;
    }
    if (e.key === 'ArrowRight') {
      const d = filtered[currentIdx];
      if (!d) return;
      const allImages = []; if (d.image) allImages.push(d.image); (d.gallery||[]).forEach(u => { if (u !== d.image) allImages.push(u); });
      if (selectedImgIdx < allImages.length - 1) { selectedImgIdx++; renderCard(); }
      e.preventDefault(); return;
    }
    // F = toggle delete on selected image
    if (e.key === 'f' || e.key === 'F') { toggleDeleteImage(); e.preventDefault(); return; }
    // A = set selected image as main
    if (e.key === 'a' || e.key === 'A') { setMainImage(); e.preventDefault(); return; }
    // Enter = submit and next listing
    if (e.key === 'Enter') { submitAndNext(); e.preventDefault(); return; }
    // S = skip (next listing without submitting)
    if (e.key === 's' || e.key === 'S') { selectedImgIdx = 0; goNext(); e.preventDefault(); return; }
    // P = prev listing
    if (e.key === 'p' || e.key === 'P') { selectedImgIdx = 0; goPrev(); e.preventDefault(); return; }
  }
});

// Table View
function renderTable() {
  const el = document.getElementById('tableView');
  if (!filtered.length) { el.innerHTML = '<p style="padding:40px;text-align:center;color:var(--muted)">No listings match.</p>'; return; }

  const isApprovedTab = currentMainTab === 'approved';
  
  if (isApprovedTab) {
    let rows = filtered.map((d,i) => {
      const listingUrl = `https://castlecore.uk/site/${d.country}/${(d.region||'')}/${d.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')}.html`;
      const wikiUrl = d.wiki || '';
      return `<tr>
        <td><strong>${esc(d.name)}</strong></td>
        <td><a href="${listingUrl}" target="_blank">View Listing ↗</a></td>
        <td>${wikiUrl ? `<a href="${esc(wikiUrl)}" target="_blank">📖 Wikipedia ↗</a>` : '<span style="color:var(--muted)">—</span>'}</td>
      </tr>`;
    }).join('');
    el.innerHTML = `<table><thead><tr><th>Castle Name</th><th>Our Listing</th><th>Approved Sources</th></tr></thead><tbody>${rows}</tbody></table>`;
    return;
  }
  
  let rows = filtered.map((d,i) => {
    const k = getKey(d);

    const fi = flaggedImages[k];
    const ff = fieldFlags[k];
    const statusHtml = st.status
      ? `<span class="tbl-status" style="background:${st.status==='approved'?'var(--green)':'var(--red)'};color:#fff">${st.status}</span>`
      : '<span class="tbl-status" style="background:var(--border);color:var(--muted)">unreviewed</span>';
    const reasonsHtml = st.reasons ? st.reasons.map(r => `<span style="background:#1a0a0a;border:1px solid var(--red);color:var(--red);padding:1px 5px;border-radius:3px;font-size:10px;margin:1px;display:inline-block">${r}</span>`).join(' ') : '';
    const noteHtml = st.note ? `<div style="font-size:11px;color:var(--muted);margin-top:2px;font-style:italic">${esc(st.note)}</div>` : '';
    const imgFlags = fi && fi.size ? `<span style="color:var(--red);font-size:11px">📷 ${fi.size} img flagged</span>` : '';
    const fieldFlagHtml = ff ? Object.keys(ff).filter(f=>ff[f]).map(f => `<span style="color:var(--red);font-size:11px">⚑ ${f}</span>`).join(' ') : '';
    
    return `<tr style="cursor:pointer" onclick="switchMainTab('review');currentIdx=${allData.indexOf(d)};filtered=allData.filter(x=>getStatus(x)==='flagged');currentIdx=${i};setView('card')">
      <td>${i+1}</td>
      <td>${d.image?`<img class="tbl-img" src="${esc(d.image)}" loading="lazy">`:'—'}</td>
      <td><strong>${esc(d.name)}</strong></td>
      <td>${esc(d.country)}</td>
      <td>${esc(d.region||'').replace(/-/g,' ')}</td>
      <td>${esc(d.county||'')}</td>
      <td>${esc(d.type||'')}</td>
      ${isFlaggedTab ? `<td>${reasonsHtml}${noteHtml}</td><td>${imgFlags} ${fieldFlagHtml}</td>` : `<td>${statusHtml}</td><td style="font-size:11px;color:var(--muted)">${st.reasons?st.reasons.join(', '):''}</td>`}
    </tr>`;
  }).join('');
  const headers = isFlaggedTab 
    ? '<th>#</th><th>Image</th><th>Name</th><th>Country</th><th>Region</th><th>County</th><th>Type</th><th>Flag Reasons</th><th>Other Flags</th>'
    : '<th>#</th><th>Image</th><th>Name</th><th>Country</th><th>Region</th><th>County</th><th>Type</th><th>Status</th><th>Flags</th>';
  el.innerHTML = `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
}

function setView(v) {
  currentView = v;
  document.getElementById('cardView').style.display = v === 'card' ? 'block' : 'none';
  document.getElementById('tableView').style.display = v === 'table' ? 'block' : 'none';
  document.getElementById('actionBar').style.display = v === 'card' ? 'flex' : 'none';
  document.getElementById('btnCardView').classList.toggle('active', v === 'card');
  document.getElementById('btnTableView').classList.toggle('active', v === 'table');
  if (v === 'card') renderCard(); else renderTable();
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function exportCSV(which) {
  let rows = allData;
  if (which === 'flagged') rows = allData.filter(d => (reviewState[getKey(d)]||{}).status === 'flagged');
  const headers = ['Name','Country','Region','County','Lat','Lng','Image','ImgSource','Description','Type','Period','Rating','Status','Flag Reasons','Note','Flagged Images','Flagged Fields'];
  const csv = [headers.join(','), ...rows.map(d => {
    const k = getKey(d); const st = reviewState[k] || {}; const fi = flaggedImages[k] ? [...flaggedImages[k]] : []; const ff = fieldFlags[k] ? Object.keys(fieldFlags[k]).filter(f=>fieldFlags[k][f]) : [];
    return [JSON.stringify(d.name),d.country,d.region,JSON.stringify(d.county||''),d.lat,d.lng,d.image,d.imgSource,JSON.stringify((d.desc||'').slice(0,200)),d.type,d.period,d.rating,st.status||'unreviewed',JSON.stringify((st.reasons||[]).join('; ')),JSON.stringify(st.note||''),JSON.stringify(fi.join('; ')),JSON.stringify(ff.join('; '))].join(',');
  })].join('\n');
  const blob = new Blob([csv], {type:'text/csv'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `castlecore-${which}.csv`; a.click();
}

function copyForClawz() {
  const flagged = allData.filter(d => {
    const k = getKey(d); const st = reviewState[k];
    return (st && st.status === 'flagged') || (flaggedImages[k] && flaggedImages[k].size) || (fieldFlags[k] && Object.keys(fieldFlags[k]).length);
  });
  if (!flagged.length) { alert('No flagged entries!'); return; }
  const lines = flagged.map(d => {
    const k = getKey(d); const st = reviewState[k] || {};
    const parts = [`**${d.name}** (${d.country}, ${d.region})`];
    if (st.reasons && st.reasons.length) parts.push(`Reasons: ${st.reasons.join(', ')}`);
    if (st.note) parts.push(`Note: ${st.note}`);
    const fi = flaggedImages[k]; if (fi && fi.size) parts.push(`Flagged images: ${fi.size}`);
    const ff = fieldFlags[k]; if (ff) { const fields = Object.keys(ff).filter(f=>ff[f]); if (fields.length) parts.push(`Flagged fields: ${fields.join(', ')}`); }
    return parts.join(' | ');
  });
  const text = `Flagged ${flagged.length} listings:\n\n` + lines.join('\n');
  navigator.clipboard.writeText(text).then(() => alert(`Copied ${flagged.length} flagged entries!`)).catch(() => prompt('Copy this:', text));
}

function saveProgressToFile() {
  // Update all entries with current review state + image decisions
  const updated = allData.map(d => {
    const k = getKey(d);
    const st = reviewState[k];
    const copy = {...d};
    if (st) {
      copy.reviewStatus = st.status;
      if (st.reasons) copy.reviewReasons = st.reasons;
      else delete copy.reviewReasons;
      if (st.note) copy.reviewNote = st.note;
      else delete copy.reviewNote;
    }
    // Include image decisions
    const dec = imageDecisions[k];
    if (dec) {
      const allImages = []; if (d.image) allImages.push(d.image); (d.gallery||[]).forEach(u => { if (u !== d.image) allImages.push(u); });
      if (dec.main >= 0 && dec.main < allImages.length) copy.mainImage = allImages[dec.main];
      if (dec.deleted && dec.deleted.size) copy.deletedImages = [...dec.deleted].map(i => allImages[i]).filter(Boolean);
      if (dec.submitted) copy.imageReviewDone = true;
    }
    // Include image flags
    const fi = flaggedImages[k];
    if (fi && fi.size) copy.flaggedImages = [...fi];
    else delete copy.flaggedImages;
    // Include field flags
    const ff = fieldFlags[k];
    if (ff && Object.keys(ff).length) copy.flaggedFields = Object.keys(ff).filter(f=>ff[f]);
    else delete copy.flaggedFields;
    return copy;
  });
  const blob = new Blob([JSON.stringify(updated, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'audit-data.json';
  a.click();
  
  const submitted = Object.values(imageDecisions).filter(d => d.submitted).length;
  alert(`Downloaded audit-data.json!\n\n${submitted} listings with image decisions.\nDrop this file in the castle-explorer folder and tell Clawz to pick it up.`);
}

function updateExportCount() {
  const ct = allData.filter(d => { const k=getKey(d); const st=reviewState[k]; return (st&&st.status==='flagged')||(flaggedImages[k]&&flaggedImages[k].size)||(fieldFlags[k]&&Object.keys(fieldFlags[k]).length); }).length;
