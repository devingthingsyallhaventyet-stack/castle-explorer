<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Image Review Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: #1a1a1a;
            padding: 20px;
            border-bottom: 2px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            color: #ff6b35;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        select, input {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #ff6b35;
        }

        .stats {
            background: #2a2a2a;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 14px;
        }

        .stats span {
            color: #ff6b35;
            font-weight: bold;
        }

        .container {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .castle-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .castle-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .castle-card:hover {
            transform: translateY(-2px);
            border-color: #555;
        }

        .castle-card.flagged {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .castle-card.reviewed-correct {
            border-color: #44ff44;
            background: rgba(68, 255, 68, 0.1);
        }

        .castle-card.reviewed-wrong {
            border-color: #ff8844;
            background: rgba(255, 136, 68, 0.1);
        }

        .castle-header {
            margin-bottom: 15px;
        }

        .castle-name {
            font-size: 18px;
            font-weight: bold;
            color: #ff6b35;
            margin-bottom: 5px;
        }

        .castle-location {
            color: #aaa;
            font-size: 14px;
        }

        .castle-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #333;
            border: 1px solid #444;
        }

        .image-placeholder {
            width: 100%;
            height: 200px;
            background: #333;
            border: 2px dashed #666;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .gallery-thumbnails {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            overflow-x: auto;
        }

        .gallery-thumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #444;
            flex-shrink: 0;
        }

        .description {
            color: #ccc;
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 15px;
            max-height: 60px;
            overflow: hidden;
        }

        .review-buttons {
            display: flex;
            gap: 8px;
        }

        .review-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .correct-btn {
            background: #44aa44;
            color: white;
        }

        .correct-btn:hover, .correct-btn.active {
            background: #55bb55;
        }

        .wrong-btn {
            background: #aa4444;
            color: white;
        }

        .wrong-btn:hover, .wrong-btn.active {
            background: #bb5555;
        }

        .skip-btn {
            background: #666;
            color: white;
        }

        .skip-btn:hover, .skip-btn.active {
            background: #777;
        }

        .flag-indicator {
            background: #ff4444;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .pagination {
            margin: 30px 0;
            text-align: center;
        }

        .pagination button {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 8px 16px;
            margin: 0 5px;
            border-radius: 6px;
            cursor: pointer;
        }

        .pagination button:hover {
            background: #3a3a3a;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: #ff6b35;
            border-color: #ff6b35;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .castle-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏰 Castle Image Review Dashboard</h1>
        <div class="controls">
            <div class="filter-group">
                <label>Country:</label>
                <select id="countryFilter">
                    <option value="">All Countries</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Status:</label>
                <select id="statusFilter">
                    <option value="">All</option>
                    <option value="flagged">Flagged Only</option>
                    <option value="has-image">Has Image</option>
                    <option value="no-image">No Image</option>
                    <option value="reviewed">Reviewed</option>
                    <option value="pending">Pending Review</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Search:</label>
                <input type="text" id="searchInput" placeholder="Castle name..." />
            </div>
            <div class="stats">
                Total: <span id="totalCount">0</span> | 
                Flagged: <span id="flaggedCount">0</span> | 
                Reviewed: <span id="reviewedCount">0</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="loading" class="loading">Loading castle data...</div>
        <div id="castleGrid" class="castle-grid" style="display: none;"></div>
        <div id="noResults" class="no-results" style="display: none;">No castles match your filters.</div>
        <div id="pagination" class="pagination" style="display: none;"></div>
    </div>

    <script>
        class CastleReviewDashboard {
            constructor() {
                this.allCastles = [];
                this.filteredCastles = [];
                this.currentPage = 1;
                this.itemsPerPage = 50;
                this.reviewState = JSON.parse(localStorage.getItem('castle-review-state') || '{}');
                this.init();
            }

            async init() {
                try {
                    await this.loadCastleData();
                    this.analyzeCastles();
                    this.setupEventListeners();
                    this.populateCountryFilter();
                    this.filterCastles();
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('castleGrid').style.display = 'grid';
                    document.getElementById('pagination').style.display = 'block';
                } catch (error) {
                    console.error('Error initializing dashboard:', error);
                    document.getElementById('loading').innerHTML = 'Error loading castle data: ' + error.message;
                }
            }

            async loadCastleData() {
                // Load the castle data from the parent directory
                try {
                    const response = await fetch('../data.js');
                    const dataContent = await response.text();
                    
                    // Execute the data file content to get CASTLES array
                    const func = new Function(dataContent + '; return CASTLES;');
                    this.allCastles = func();
                } catch (error) {
                    // Fallback: try to parse the data differently
                    console.warn('Primary load method failed, trying fallback...');
                    throw new Error('Could not load castle data. Please ensure data.js is accessible.');
                }
            }

            analyzeCastles() {
                const imageUrls = new Map();
                const galleryUrls = new Map();

                // First pass: collect all URLs
                this.allCastles.forEach((castle, index) => {
                    castle._index = index;
                    castle._flags = [];

                    // Check for missing image
                    if (!castle.image) {
                        castle._flags.push('No main image');
                    } else {
                        // Track duplicate main images
                        if (imageUrls.has(castle.image)) {
                            imageUrls.get(castle.image).push(index);
                        } else {
                            imageUrls.set(castle.image, [index]);
                        }

                        // Check if image filename relates to castle name
                        const imageName = castle.image.split('/').pop().toLowerCase();
                        const castleName = castle.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                        const nameWords = castleName.split(/\s+/);
                        
                        let hasRelatedName = false;
                        for (const word of nameWords) {
                            if (word.length > 3 && imageName.includes(word)) {
                                hasRelatedName = true;
                                break;
                            }
                        }
                        
                        if (!hasRelatedName && !imageName.includes(castleName.substring(0, 5))) {
                            castle._flags.push('Image filename unrelated to castle name');
                        }
                    }

                    // Track gallery images
                    if (castle.gallery && castle.gallery.length > 0) {
                        castle.gallery.forEach(url => {
                            if (galleryUrls.has(url)) {
                                galleryUrls.get(url).push(index);
                            } else {
                                galleryUrls.set(url, [index]);
                            }
                        });
                    }
                });

                // Second pass: flag duplicates
                imageUrls.forEach((indices, url) => {
                    if (indices.length > 1) {
                        indices.forEach(index => {
                            this.allCastles[index]._flags.push('Duplicate main image');
                        });
                    }
                });

                galleryUrls.forEach((indices, url) => {
                    if (indices.length > 1) {
                        indices.forEach(index => {
                            this.allCastles[index]._flags.push('Duplicate gallery image');
                        });
                    }
                });

                // Sort to show flagged items first
                this.allCastles.sort((a, b) => {
                    const aFlagged = a._flags.length > 0 ? 0 : 1;
                    const bFlagged = b._flags.length > 0 ? 0 : 1;
                    return aFlagged - bFlagged;
                });
            }

            populateCountryFilter() {
                const countries = [...new Set(this.allCastles.map(c => c.country))].sort();
                const select = document.getElementById('countryFilter');
                
                countries.forEach(country => {
                    const option = document.createElement('option');
                    option.value = country;
                    option.textContent = country;
                    select.appendChild(option);
                });
            }

            setupEventListeners() {
                document.getElementById('countryFilter').addEventListener('change', () => this.filterCastles());
                document.getElementById('statusFilter').addEventListener('change', () => this.filterCastles());
                document.getElementById('searchInput').addEventListener('input', () => this.filterCastles());
            }

            filterCastles() {
                const country = document.getElementById('countryFilter').value;
                const status = document.getElementById('statusFilter').value;
                const search = document.getElementById('searchInput').value.toLowerCase();

                this.filteredCastles = this.allCastles.filter(castle => {
                    // Country filter
                    if (country && castle.country !== country) return false;

                    // Search filter
                    if (search && !castle.name.toLowerCase().includes(search)) return false;

                    // Status filter
                    switch (status) {
                        case 'flagged':
                            return castle._flags.length > 0;
                        case 'has-image':
                            return castle.image;
                        case 'no-image':
                            return !castle.image;
                        case 'reviewed':
                            return this.reviewState[castle._index];
                        case 'pending':
                            return !this.reviewState[castle._index];
                    }

                    return true;
                });

                this.currentPage = 1;
                this.updateStats();
                this.renderCastles();
                this.renderPagination();
            }

            updateStats() {
                const total = this.allCastles.length;
                const flagged = this.allCastles.filter(c => c._flags.length > 0).length;
                const reviewed = this.allCastles.filter(c => this.reviewState[c._index]).length;

                document.getElementById('totalCount').textContent = total;
                document.getElementById('flaggedCount').textContent = flagged;
                document.getElementById('reviewedCount').textContent = reviewed;
            }

            renderCastles() {
                const grid = document.getElementById('castleGrid');
                const noResults = document.getElementById('noResults');

                if (this.filteredCastles.length === 0) {
                    grid.style.display = 'none';
                    noResults.style.display = 'block';
                    return;
                }

                grid.style.display = 'grid';
                noResults.style.display = 'none';

                const startIndex = (this.currentPage - 1) * this.itemsPerPage;
                const endIndex = startIndex + this.itemsPerPage;
                const pageItems = this.filteredCastles.slice(startIndex, endIndex);

                grid.innerHTML = pageItems.map(castle => this.renderCastleCard(castle)).join('');

                // Add event listeners for review buttons
                pageItems.forEach(castle => {
                    const buttons = grid.querySelectorAll(`[data-castle="${castle._index}"]`);
                    buttons.forEach(btn => {
                        btn.addEventListener('click', () => this.handleReview(castle._index, btn.dataset.action));
                    });
                });
            }

            renderCastleCard(castle) {
                const reviewStatus = this.reviewState[castle._index];
                const cardClass = castle._flags.length > 0 ? 'flagged' : 
                                 reviewStatus === 'correct' ? 'reviewed-correct' :
                                 reviewStatus === 'wrong' ? 'reviewed-wrong' : '';

                const flagsHtml = castle._flags.length > 0 ? 
                    `<div class="flag-indicator">🚩 ${castle._flags.join(', ')}</div>` : '';

                const mainImageHtml = castle.image ? 
                    `<img src="${castle.image}" class="castle-image" alt="${castle.name}" loading="lazy" onerror="this.style.display='none'">` :
                    `<div class="image-placeholder">No Image Available</div>`;

                const galleryHtml = castle.gallery && castle.gallery.length > 0 ?
                    `<div class="gallery-thumbnails">
                        ${castle.gallery.slice(0, 3).map(img => 
                            `<img src="${img}" class="gallery-thumb" alt="Gallery" loading="lazy" onerror="this.style.display='none'">`
                        ).join('')}
                    </div>` : '';

                const description = castle.description ? 
                    castle.description.substring(0, 100) + (castle.description.length > 100 ? '...' : '') : 
                    'No description available';

                return `
                    <div class="castle-card ${cardClass}">
                        ${flagsHtml}
                        <div class="castle-header">
                            <div class="castle-name">${castle.name} <a href="https://www.google.com/search?q=${encodeURIComponent(castle.name + ' ' + (castle.county || '') + ' ' + castle.country)}&tbm=isch" target="_blank" style="font-size:0.7em;color:#6ba3d6;text-decoration:none;margin-left:8px" title="Google Image Search">🔍 Google</a></div>
                            <div class="castle-location">${castle.county || 'Unknown County'}, ${castle.country}</div>
                        </div>
                        ${mainImageHtml}
                        ${galleryHtml}
                        <div class="description">${description}</div>
                        <div class="review-buttons">
                            <button class="review-btn correct-btn ${reviewStatus === 'correct' ? 'active' : ''}" 
                                    data-castle="${castle._index}" data-action="correct">Correct ✓</button>
                            <button class="review-btn wrong-btn ${reviewStatus === 'wrong' ? 'active' : ''}" 
                                    data-castle="${castle._index}" data-action="wrong">Wrong Image ✗</button>
                            <button class="review-btn skip-btn ${reviewStatus === 'skip' ? 'active' : ''}" 
                                    data-castle="${castle._index}" data-action="skip">Skip</button>
                        </div>
                    </div>
                `;
            }

            handleReview(castleIndex, action) {
                this.reviewState[castleIndex] = action;
                localStorage.setItem('castle-review-state', JSON.stringify(this.reviewState));
                
                // Update the card visually
                const card = document.querySelector(`[data-castle="${castleIndex}"]`).closest('.castle-card');
                card.className = 'castle-card ' + 
                    (action === 'correct' ? 'reviewed-correct' : 
                     action === 'wrong' ? 'reviewed-wrong' : '');

                // Update button states
                const buttons = card.querySelectorAll('.review-btn');
                buttons.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.action === action);
                });

                this.updateStats();
            }

            renderPagination() {
                const pagination = document.getElementById('pagination');
                const totalPages = Math.ceil(this.filteredCastles.length / this.itemsPerPage);

                if (totalPages <= 1) {
                    pagination.style.display = 'none';
                    return;
                }

                pagination.style.display = 'block';

                const buttons = [];
                
                // Previous button
                buttons.push(`<button ${this.currentPage === 1 ? 'disabled' : ''} onclick="dashboard.goToPage(${this.currentPage - 1})">← Previous</button>`);

                // Page numbers (show max 7 pages)
                let startPage = Math.max(1, this.currentPage - 3);
                let endPage = Math.min(totalPages, startPage + 6);
                
                if (endPage - startPage < 6) {
                    startPage = Math.max(1, endPage - 6);
                }

                for (let i = startPage; i <= endPage; i++) {
                    buttons.push(`<button class="${i === this.currentPage ? 'active' : ''}" onclick="dashboard.goToPage(${i})">${i}</button>`);
                }

                // Next button
                buttons.push(`<button ${this.currentPage === totalPages ? 'disabled' : ''} onclick="dashboard.goToPage(${this.currentPage + 1})">Next →</button>`);

                pagination.innerHTML = buttons.join('');
            }

            goToPage(page) {
                this.currentPage = page;
                this.renderCastles();
                this.renderPagination();
                window.scrollTo(0, 0);
            }
        }

        // Initialize dashboard
        let dashboard;
        document.addEventListener('DOMContentLoaded', () => {
            dashboard = new CastleReviewDashboard();
        });
    </script>
</body>
</html>
