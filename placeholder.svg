<svg xmlns="http://www.w3.org/2000/svg" width="500" height="375" viewBox="0 0 500 375">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e0d4"/>
      <stop offset="100%" stop-color="#d4cabc"/>
    </linearGradient>
  </defs>
  <rect width="500" height="375" fill="url(#bg)"/>
  <!-- Castle silhouette -->
  <g transform="translate(250,160)" fill="#8b2335" opacity="0.15">
    <!-- Main tower -->
    <rect x="-20" y="-60" width="40" height="80" rx="2"/>
    <!-- Left tower -->
    <rect x="-55" y="-40" width="30" height="60" rx="2"/>
    <!-- Right tower -->
    <rect x="25" y="-40" width="30" height="60" rx="2"/>
    <!-- Battlements main -->
    <rect x="-24" y="-70" width="10" height="14"/>
    <rect x="-8" y="-70" width="10" height="14"/>
    <rect x="14" y="-70" width="10" height="14"/>
    <!-- Battlements left -->
    <rect x="-58" y="-50" width="8" height="12"/>
    <rect x="-44" y="-50" width="8" height="12"/>
    <rect x="-30" y="-50" width="8" height="12"/>
    <!-- Battlements right -->
    <rect x="50" y="-50" width="8" height="12"/>
    <rect x="36" y="-50" width="8" height="12"/>
    <rect x="22" y="-50" width="8" height="12"/>
    <!-- Wall sections -->
    <rect x="-55" y="0" width="110" height="20" rx="2"/>
    <!-- Gate arch -->
    <ellipse cx="0" cy="20" rx="12" ry="16"/>
    <!-- Flag pole -->
    <rect x="-1" y="-85" width="2" height="20"/>
    <polygon points="1,-85 1,-72 12,-78"/>
  </g>
  <!-- Text -->
  <text x="250" y="240" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#8b2335" opacity="0.4">Image Coming Soon</text>
  <text x="250" y="260" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#8b2335" opacity="0.3">castlecore</text>
</svg>